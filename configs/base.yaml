project:
  name: payment-fraud-risk
  seed: 42

paths:
  dataset_csv: data/raw/digital_payments_fraud.csv
  model_dir: models
  reports_dir: reports

data:
  target_col: fraud_label
  drop_cols: [transaction_id, user_id]
  test_size: 0.2

features:
  categorical:
    - transaction_type
    - payment_mode
    - device_type
    - device_location
    - is_international
  numeric:
    - transaction_amount
    - account_age_days
    - transaction_hour
    - previous_failed_attempts
    - avg_transaction_amount
    - ip_risk_score
    - login_attempts_last_24h
  one_hot_min_freq: 10

model:
  kind: xgboost
  params:
    n_estimators: 600
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    min_child_weight: 1
    objective: binary:logistic
    eval_metric: aucpr

decision:
  threshold: 0.5

explain:
  shap_max_samples: 2000
  top_k_features: 10
